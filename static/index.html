<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AInterior - 3D Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #6D6943;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #F4F3EE;
            padding: 20px;
            box-shadow: 0 1px 3px rgba(72, 55, 47, 0.1);
            border-bottom: 4px solid #C8A1B1;
        }

        .header h1 {
            color: #48372F;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #6D6943;
            font-size: 14px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .container {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            min-height: 0;
        }

        .upload-panel {
            width: 320px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(72, 55, 47, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
            border: 2px solid #C8A1B1;
        }

        .viewer-panel {
            flex: 1;
            background: #F4F3EE;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(72, 55, 47, 0.1);
            position: relative;
            border: 2px solid #C8A1B1;
        }

        .upload-area {
            border: 2px dashed #C8A1B1;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #F4F3EE;
        }

        .upload-area:hover {
            border-color: #6D6943;
            background: #F4F3EE;
            border-width: 2px;
            border-style: solid;
        }

        .upload-area.dragging {
            border-color: #6D6943;
            background: #F4F3EE;
            transform: scale(1.02);
            border-width: 2px;
            border-style: solid;
        }

        .upload-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-icon svg {
            width: 100%;
            height: 100%;
        }

        .upload-text {
            color: #48372F;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        .btn {
            background: #C8A1B1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #6D6943;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #C8A1B1;
            color: white;
            display: block;
        }

        .status.error {
            background: #48372F;
            color: white;
            display: block;
        }

        .status.info {
            background: #6D6943;
            color: white;
            display: block;
        }

        .model-info {
            background: #F4F3EE;
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
            border: 1px solid #C8A1B1;
        }

        .model-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #6D6943;
        }

        .model-info-label {
            font-weight: 600;
            color: #48372F;
        }

        #viewer {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
        }

        .controls-hint strong {
            display: block;
            margin-bottom: 5px;
            color: #C8A1B1;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #C8A1B1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 18px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .models-list {
            background: #F4F3EE;
            border-radius: 8px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            border: 1px solid #C8A1B1;
        }

        .models-list-title {
            font-weight: 600;
            color: #48372F;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .model-item {
            background: white;
            border: 1px solid #C8A1B1;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .model-item:hover {
            background: #F4F3EE;
            border-color: #6D6943;
            transform: translateX(4px);
            box-shadow: 0 2px 4px rgba(72, 55, 47, 0.1);
        }

        .model-item-name {
            font-size: 13px;
            color: #48372F;
            font-weight: 500;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .model-item-meta {
            font-size: 11px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }

        .models-list::-webkit-scrollbar {
            width: 6px;
        }

        .models-list::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 3px;
        }

        .models-list::-webkit-scrollbar-thumb {
            background: #C8A1B1;
            border-radius: 3px;
        }

        .models-list::-webkit-scrollbar-thumb:hover {
            background: #6D6943;
        }

        .empty-list {
            text-align: center;
            color: #999;
            font-size: 13px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AInterior</h1>
    </div>

    <div class="container">
        <div class="upload-panel">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <svg width="110" height="113" viewBox="0 0 110 113" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M106 52.5659L58.3748 101.591C41.5005 113.988 20.6152 108.251 13.6083 101.591C-1.60828 87.1274 3.09787 71.339 14.9102 57.2672L65.771 7.87136C73.9458 0.0358686 91.5592 5.53774 95.8412 11.5909C100.123 17.6441 102.752 24.3259 99.3827 31.8018C96.0132 39.2777 49.1054 85.0383 48.777 84.6915C42.3921 88.5 36.9647 91.6791 29.3133 87.0099C22.9509 80.7094 24.8972 73.6896 29.3133 67.8451L51.5019 46.6893" stroke="#6D6943" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="upload-text">Перетащите файл сюда</div>
                <div class="upload-hint">или нажмите для выбора</div>
                <div class="upload-hint" style="margin-top: 10px;">Поддерживаются: GLB, GLTF, OBJ</div>
            </div>
            <input type="file" id="fileInput" accept=".glb,.gltf,.obj,.fbx,.stl" />

            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">Загрузка...</p>
            </div>

            <div class="status" id="status"></div>

            <div class="model-info" id="modelInfo" style="display: none;">
                <div class="model-info-item">
                    <span class="model-info-label">Файл:</span>
                    <span id="fileName">-</span>
                </div>
                <div class="model-info-item">
                    <span class="model-info-label">Размер:</span>
                    <span id="fileSize">-</span>
                </div>
            </div>

            <div class="models-list" id="modelsList">
                <div class="models-list-title">Загруженные модели</div>
                <div id="modelsListContent">
                    <div class="empty-list">Нет загруженных моделей</div>
                </div>
            </div>

            <button class="btn" id="clearBtn" style="display: none;">Очистить сцену</button>
        </div>

        <div class="viewer-panel">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">🎨</div>
                <div>Загрузите 3D модель для просмотра</div>
            </div>
            <canvas id="viewer" style="display: none;"></canvas>
            <div class="controls-hint" style="display: none;" id="controlsHint">
                <strong>ТУТ:</strong>
                 БУДЕТ<br>
                КАКАЯ-НИБУДЬ<br>
                ИНСТРУКЦИЯ
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        let scene, camera, renderer, controls;
        let currentModel = null;

        function initViewer() {
            const canvas = document.getElementById('viewer');
            const viewerPanel = canvas.parentElement;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xF4F3EE);
            scene.fog = new THREE.Fog(0xF4F3EE, 10, 50);

            camera = new THREE.PerspectiveCamera(
                50,
                viewerPanel.clientWidth / viewerPanel.clientHeight,
                0.1,
                1000
            );
            camera.position.set(5, 5, 5);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(viewerPanel.clientWidth, viewerPanel.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 1;
            controls.maxDistance = 50;
            controls.maxPolarAngle = Math.PI / 2;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            scene.add(hemisphereLight);

            const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0xcccccc);
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function onWindowResize() {
            const canvas = document.getElementById('viewer');
            const viewerPanel = canvas.parentElement;
            camera.aspect = viewerPanel.clientWidth / viewerPanel.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(viewerPanel.clientWidth, viewerPanel.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function showViewer() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('viewer').style.display = 'block';
            document.getElementById('controlsHint').style.display = 'block';
        }

        function hideViewer() {
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('controlsHint').style.display = 'none';
        }

        function clearScene() {
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }
            hideViewer();
            document.getElementById('modelInfo').style.display = 'none';
            document.getElementById('clearBtn').style.display = 'none';
            showStatus('Сцена очищена', 'info');
        }

        function loadModel(url, filename, fromList = false) {
            showViewer();
            
            if (currentModel) {
                scene.remove(currentModel);
            }

            const extension = filename.split('.').pop().toLowerCase();
            
            if (extension === 'glb' || extension === 'gltf') {
                const loader = new GLTFLoader();
                loader.load(
                    url,
                    (gltf) => {
                        currentModel = gltf.scene;
                        
                        const box = new THREE.Box3().setFromObject(currentModel);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 4 / maxDim;
                        currentModel.scale.multiplyScalar(scale);
                        
                        currentModel.position.x = -center.x * scale;
                        currentModel.position.y = -box.min.y * scale;
                        currentModel.position.z = -center.z * scale;
                        
                        scene.add(currentModel);
                        
                        camera.position.set(5, 5, 5);
                        controls.target.set(0, size.y * scale / 2, 0);
                        controls.update();
                        
                        if (!fromList) {
                            showStatus('Модель успешно загружена!', 'success');
                        }
                        document.getElementById('clearBtn').style.display = 'block';
                    },
                    (progress) => {
                        console.log('Loading progress:', progress);
                    },
                    (error) => {
                        console.error('Error loading model:', error);
                        showStatus('Ошибка загрузки модели', 'error');
                        hideViewer();
                    }
                );
            } else if (extension === 'obj') {
                const loader = new OBJLoader();
                loader.load(
                    url,
                    (obj) => {
                        currentModel = obj;
                        
                        currentModel.traverse((child) => {
                            if (child.isMesh) {
                                child.material = new THREE.MeshPhongMaterial({ 
                                    color: 0x888888,
                                    side: THREE.DoubleSide
                                });
                            }
                        });
                        
                        const box = new THREE.Box3().setFromObject(currentModel);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 4 / maxDim;
                        currentModel.scale.multiplyScalar(scale);
                        
                        currentModel.position.x = -center.x * scale;
                        currentModel.position.y = -box.min.y * scale;
                        currentModel.position.z = -center.z * scale;
                        
                        scene.add(currentModel);
                        
                        camera.position.set(5, 5, 5);
                        controls.target.set(0, size.y * scale / 2, 0);
                        controls.update();
                        
                        if (!fromList) {
                            showStatus('Модель успешно загружена!', 'success');
                        }
                        document.getElementById('clearBtn').style.display = 'block';
                    },
                    (progress) => {
                        console.log('Loading progress:', progress);
                    },
                    (error) => {
                        console.error('Error loading model:', error);
                        showStatus('Ошибка загрузки OBJ модели', 'error');
                        hideViewer();
                    }
                );
            } else {
                showStatus(`Формат ${extension.toUpperCase()} пока не поддерживается`, 'error');
                hideViewer();
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    status.className = 'status';
                }, 3000);
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return 'только что';
            if (diffMins < 60) return `${diffMins} мин. назад`;
            
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours} ч. назад`;
            
            const diffDays = Math.floor(diffHours / 24);
            if (diffDays < 7) return `${diffDays} дн. назад`;
            
            return date.toLocaleDateString('ru-RU');
        }

        async function loadModelsList() {
            try {
                const response = await fetch('/list_models');
                const data = await response.json();
                
                const listContent = document.getElementById('modelsListContent');
                
                if (data.models && data.models.length > 0) {
                    const sortedModels = data.models.sort((a, b) => {
                        return new Date(b.modified) - new Date(a.modified);
                    });
                    
                    listContent.innerHTML = sortedModels.map(model => `
                        <div class="model-item" onclick="loadModelFromList('${model.url}', '${model.filename}')">
                            <div class="model-item-name">${model.filename}</div>
                            <div class="model-item-meta">
                                <span>${formatFileSize(model.size)}</span>
                                <span>${formatDate(model.modified)}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listContent.innerHTML = '<div class="empty-list">Нет загруженных моделей</div>';
                }
            } catch (error) {
                console.error('Error loading models list:', error);
            }
        }

        function loadModelFromList(url, filename) {
            loadModel(url, filename, true);
        }

        window.loadModelFromList = loadModelFromList;

        async function uploadFile(file) {
            const loader = document.getElementById('loader');
            const modelInfo = document.getElementById('modelInfo');
            
            loader.classList.add('active');
            showStatus('Загрузка файла...', 'info');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload_model', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Ошибка загрузки');
                }

                const result = await response.json();
                
                document.getElementById('fileName').textContent = result.original_filename;
                document.getElementById('fileSize').textContent = formatFileSize(result.size);
                modelInfo.style.display = 'block';
                
                loadModel(result.download_url, result.filename);
                
                loadModelsList();
                
            } catch (error) {
                showStatus(`Ошибка: ${error.message}`, 'error');
                console.error('Upload error:', error);
            } finally {
                loader.classList.remove('active');
            }
        }

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const clearBtn = document.getElementById('clearBtn');

        uploadArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) uploadFile(file);
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragging');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            
            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        });

        clearBtn.addEventListener('click', clearScene);

        initViewer();
        loadModelsList();
    </script>
</body>
</html>
