<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AInterior Scene Viewer</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; }
  #info {
    position: absolute; top: 10px; left: 10px; color: #fff;
    font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.6);
    padding: 8px 12px; border-radius: 4px; z-index: 10;
  }
</style>
</head>
<body>
<div id="info">Loading scene...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const info = document.getElementById('info');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
scene.add(hemiLight);

const textureLoader = new THREE.TextureLoader();
const textureCache = {};

function loadTexture(materialName) {
  if (textureCache[materialName]) return textureCache[materialName];
  const tex = textureLoader.load(`/materials/${materialName}.png`);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 2);
  textureCache[materialName] = tex;
  return tex;
}

function makeMaterial(matInfo, repeatX = 2, repeatY = 2) {
  const params = { side: THREE.DoubleSide };
  if (matInfo && matInfo.name) {
    const tex = loadTexture(matInfo.name);
    tex.repeat.set(repeatX, repeatY);
    params.map = tex;
  }
  if (matInfo && matInfo.color) {
    params.color = new THREE.Color(matInfo.color.r, matInfo.color.g, matInfo.color.b);
  }
  return new THREE.MeshStandardMaterial(params);
}

function buildFloor(room) {
  const polygon = room.floor_polygon;
  if (!polygon || polygon.length < 3) return;

  const shape = new THREE.Shape();
  shape.moveTo(polygon[0].x, -polygon[0].z);
  for (let i = 1; i < polygon.length; i++) {
    shape.lineTo(polygon[i].x, -polygon[i].z);
  }
  shape.closePath();

  const geometry = new THREE.ShapeGeometry(shape);
  geometry.rotateX(-Math.PI / 2);

  const mat = makeMaterial(room.floor_material, 3, 3);
  const mesh = new THREE.Mesh(geometry, mat);
  mesh.receiveShadow = true;
  mesh.position.y = 0.001;
  scene.add(mesh);
}

function buildWall(wall) {
  const poly = wall.polygon;
  if (!poly || poly.length < 3) return;

  const vertices = [];
  for (const p of poly) {
    vertices.push(p.x, p.y, p.z);
  }

  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(vertices);
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  if (poly.length === 4) {
    geometry.setIndex([0, 1, 2, 0, 2, 3]);
  } else {
    const indices = [];
    for (let i = 1; i < poly.length - 1; i++) {
      indices.push(0, i, i + 1);
    }
    geometry.setIndex(indices);
  }
  geometry.computeVertexNormals();

  const uvs = computeWallUVs(poly);
  geometry.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(uvs), 2));

  const matName = wall.material ? wall.material.name : null;
  const mat = makeMaterial({ name: matName }, wall.width / 2, wall.height / 2);
  const mesh = new THREE.Mesh(geometry, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
}

function computeWallUVs(poly) {
  const uvs = [];
  let minU = Infinity, maxU = -Infinity, minV = Infinity, maxV = -Infinity;

  const horizontal = Math.abs(poly[0].x - poly[2].x) > 0.01 ||
                     Math.abs(poly[0].z - poly[2].z) > 0.01;

  for (const p of poly) {
    const u = Math.abs(poly[0].x - poly[2].x) > Math.abs(poly[0].z - poly[2].z) ? p.x : p.z;
    const v = p.y;
    uvs.push(u, v);
    minU = Math.min(minU, u);
    maxU = Math.max(maxU, u);
    minV = Math.min(minV, v);
    maxV = Math.max(maxV, v);
  }

  const rangeU = maxU - minU || 1;
  const rangeV = maxV - minV || 1;
  for (let i = 0; i < uvs.length; i += 2) {
    uvs[i] = (uvs[i] - minU) / rangeU;
    uvs[i + 1] = (uvs[i + 1] - minV) / rangeV;
  }
  return uvs;
}

function buildDoor(door) {
  const hp = door.hole_polygon;
  if (!hp || hp.length < 2) return;

  const seg = door.door_segment;
  const midX = (seg.v1.x + seg.v2.x) / 2;
  const midZ = (seg.v1.z + seg.v2.z) / 2;

  const width = Math.sqrt(
    Math.pow(seg.v2.x - seg.v1.x, 2) + Math.pow(seg.v2.z - seg.v1.z, 2)
  );
  const height = hp[1].y - hp[0].y;

  const geometry = new THREE.BoxGeometry(width, height, 0.12);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x8B4513,
    roughness: 0.7,
    transparent: !door.openable,
    opacity: door.openable ? 1.0 : 0.3,
  });

  const mesh = new THREE.Mesh(geometry, mat);
  mesh.position.set(midX, hp[0].y + height / 2, midZ);

  const dx = seg.v2.x - seg.v1.x;
  const dz = seg.v2.z - seg.v1.z;
  mesh.rotation.y = Math.atan2(-dz, dx);

  mesh.castShadow = true;
  scene.add(mesh);
}

function buildWindow(win) {
  const hp = win.hole_polygon;
  if (!hp || hp.length < 2) return;

  const seg = win.window_segment;
  const midX = (seg.v1.x + seg.v2.x) / 2;
  const midZ = (seg.v1.z + seg.v2.z) / 2;

  const width = Math.sqrt(
    Math.pow(seg.v2.x - seg.v1.x, 2) + Math.pow(seg.v2.z - seg.v1.z, 2)
  );
  const height = hp[1].y - hp[0].y;

  const geometry = new THREE.BoxGeometry(width, height, 0.08);

  const mat = new THREE.MeshPhysicalMaterial({
    color: 0x88ccff,
    transparent: true,
    opacity: 0.35,
    roughness: 0.05,
    metalness: 0.1,
    transmission: 0.9,
  });

  const mesh = new THREE.Mesh(geometry, mat);
  mesh.position.set(midX, hp[0].y + height / 2, midZ);

  const dx = seg.v2.x - seg.v1.x;
  const dz = seg.v2.z - seg.v1.z;
  mesh.rotation.y = Math.atan2(-dz, dx);

  scene.add(mesh);

  const frameGeo = new THREE.BoxGeometry(width + 0.06, height + 0.06, 0.1);
  const frameMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.3 });
  const frame = new THREE.Mesh(frameGeo, frameMat);
  frame.position.copy(mesh.position);
  frame.rotation.copy(mesh.rotation);
  scene.add(frame);
}

function wallDedupeKey(wall) {
  const poly = wall.polygon;
  const coords = poly.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)},${p.z.toFixed(2)}`).sort().join('|');
  return coords;
}

async function loadScene() {
  const resp = await fetch('/scene.json');
  const data = await resp.json();

  info.textContent = `Scene: ${data.query || 'unknown'} | Rooms: ${data.rooms.length} | Walls: ${data.walls.length}`;

  let centerX = 0, centerZ = 0, count = 0;
  for (const room of data.rooms) {
    buildFloor(room);
    for (const p of (room.floor_polygon || [])) {
      centerX += p.x;
      centerZ += p.z;
      count++;
    }
  }

  const seenWallKeys = new Set();
  for (const wall of data.walls) {
    if (wall.id.includes('|exterior')) continue;
    const key = wallDedupeKey(wall);
    if (seenWallKeys.has(key)) continue;
    seenWallKeys.add(key);
    buildWall(wall);
  }

  for (const door of (data.doors || [])) {
    buildDoor(door);
  }

  for (const win of (data.windows || [])) {
    buildWindow(win);
  }

  centerX /= count || 1;
  centerZ /= count || 1;

  controls.target.set(centerX, 1.0, centerZ);
  camera.position.set(centerX - 5, 8, centerZ - 5);
  controls.update();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

loadScene();
animate();
</script>
</body>
</html>
