<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AInterior Stream Viewer</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; }
  #info {
    position: absolute; top: 10px; left: 10px; color: #fff;
    font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.6);
    padding: 8px 12px; border-radius: 4px; z-index: 10;
  }
  #stages {
    position: absolute; top: 10px; right: 10px; color: #fff;
    font-family: monospace; font-size: 13px; background: rgba(0,0,0,0.6);
    padding: 8px 12px; border-radius: 4px; z-index: 10;
    max-width: 220px;
  }
  .stage-item { padding: 2px 0; }
  .stage-done { color: #4caf50; }
  .stage-pending { color: #888; }
  .stage-active { color: #ffeb3b; }
</style>
</head>
<body>
<div id="info">Waiting for generation events...</div>
<div id="stages"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import {
  initViewer, animate, positionCamera,
  buildFloor, buildWall, buildDoor, buildWindow, buildObject, wallDedupeKey
} from '/utils.js';

const info = document.getElementById('info');
const stagesEl = document.getElementById('stages');
initViewer();

const ALL_STAGES = [
  'floor', 'walls', 'doors', 'windows',
  'object_selection', 'floor_objects', 'wall_objects', 'small_objects', 'ceiling'
];

let lastCompleted = 0;
let cameraPositioned = false;
const seenWallKeys = new Set();
const seenObjectKeys = new Set();

function updateStagesUI(currentStep, total) {
  stagesEl.innerHTML = ALL_STAGES
    .slice(0, total)
    .map((name, i) => {
      const step = i + 1;
      let cls = 'stage-pending';
      let prefix = '  ';
      if (step < currentStep) { cls = 'stage-done'; prefix = '+ '; }
      else if (step === currentStep) { cls = 'stage-active'; prefix = '> '; }
      return `<div class="stage-item ${cls}">${prefix}${name}</div>`;
    })
    .join('');
}

function positionCameraOnce(rooms) {
  if (cameraPositioned) return;
  positionCamera(rooms);
  cameraPositioned = true;
}

async function buildNewObjects(objects) {
  const promises = [];
  for (const obj of objects) {
    if (!obj.asset_id) continue;
    const key = `${obj.asset_id}_${obj.id}`;
    if (seenObjectKeys.has(key)) continue;
    seenObjectKeys.add(key);
    promises.push(buildObject(obj));
  }
  await Promise.all(promises);
}

const stageHandlers = {
  floor(data) {
    for (const room of (data.rooms || [])) {
      buildFloor(room);
    }
    positionCameraOnce(data.rooms || []);
  },

  walls(data) {
    for (const wall of (data.walls || [])) {
      if (wall.id.includes('|exterior')) continue;
      const key = wallDedupeKey(wall);
      if (seenWallKeys.has(key)) continue;
      seenWallKeys.add(key);
      buildWall(wall);
    }
  },

  doors(data) {
    for (const wall of (data.walls || [])) {
      if (wall.id.includes('|exterior')) continue;
      const key = wallDedupeKey(wall);
      if (seenWallKeys.has(key)) continue;
      seenWallKeys.add(key);
      buildWall(wall);
    }
    for (const door of (data.doors || [])) {
      buildDoor(door);
    }
  },

  windows(data) {
    for (const win of (data.windows || [])) {
      buildWindow(win);
    }
  },

  object_selection() {},

  async floor_objects(data) {
    await buildNewObjects(data.floor_objects || []);
  },

  async wall_objects(data) {
    await buildNewObjects(data.wall_objects || []);
  },

  async small_objects(data) {
    await buildNewObjects(data.small_objects || []);
  },

  async ceiling(data) {
    await buildNewObjects(data.ceiling_objects || []);
  },
};

async function handleMessage(msg) {
  const { step, progress } = msg;
  const completed = progress.completed || 0;
  const total = progress.total || 8;
  const data = progress.scene_json;

  if (completed <= lastCompleted && step !== 'completed') return;

  if (step === 'completed') {
    info.textContent = `Generation complete [${total}/${total}]`;
    updateStagesUI(total + 1, total);
    lastCompleted = total;
    return;
  }

  for (let i = lastCompleted; i < completed; i++) {
    const stageName = ALL_STAGES[i];
    if (!stageName) continue;
    info.textContent = `Stage: ${stageName} [${i + 1}/${total}]`;
    updateStagesUI(i + 1, total);
    const handler = stageHandlers[stageName];
    if (handler) {
      await handler(data);
    }
  }

  lastCompleted = completed;
}

function connectWebSocket() {
  const ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    info.textContent = 'Connected. Waiting for generation events...';
  };

  ws.onmessage = async (event) => {
    const msg = JSON.parse(event.data);
    await handleMessage(msg);
  };

  ws.onclose = () => {
    info.textContent = 'Disconnected. Reconnecting...';
    setTimeout(connectWebSocket, 2000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

updateStagesUI(0, ALL_STAGES.length);
connectWebSocket();
animate();
</script>
</body>
</html>
