<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AInterior Scene Viewer</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; }
  #info {
    position: absolute; top: 10px; left: 10px; color: #fff;
    font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.6);
    padding: 8px 12px; border-radius: 4px; z-index: 10;
  }
</style>
</head>
<body>
<div id="info">Loading scene...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import { DragControls } from 'three/addons/controls/DragControls.js';
import {
  initViewer, animate, positionCamera,
  buildFloor, buildWall, buildDoor, buildWindow, buildObject, wallDedupeKey
} from '/utils.js';

const info = document.getElementById('info');
const { camera, controls, renderer } = initViewer();

const draggableObjects = [];
let editingInteractionId = null;

async function ensureEditingSession() {
  if (editingInteractionId) return editingInteractionId;
  const resp = await fetch('/editing/start', { method: 'POST' });
  const data = await resp.json();
  editingInteractionId = data.interaction_id;
  return editingInteractionId;
}

async function saveObjectMove(mesh) {
  const interactionId = await ensureEditingSession();
  const pos = mesh.position;
  await fetch('/editing/move', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      interaction_id: interactionId,
      object_id: mesh.userData.objectId,
      position: { x: pos.x, y: pos.y, z: pos.z },
    }),
  });
}

const dragControls = new DragControls(draggableObjects, camera, renderer.domElement);

dragControls.addEventListener('dragstart', (event) => {
  controls.enabled = false;
  event.object.userData.dragY = event.object.position.y;
});

dragControls.addEventListener('drag', (event) => {
  event.object.position.y = event.object.userData.dragY;
});

dragControls.addEventListener('dragend', (event) => {
  controls.enabled = true;
  saveObjectMove(event.object);
});

async function loadScene() {
  const resp = await fetch('/scene.json');
  const data = await resp.json();

  info.textContent = `Scene: ${data.query || 'unknown'} | Rooms: ${data.rooms.length} | Walls: ${data.walls.length}`;

  for (const room of data.rooms) {
    buildFloor(room);
  }
  positionCamera(data.rooms);

  const seenWallKeys = new Set();
  for (const wall of data.walls) {
    if (wall.id.includes('|exterior')) continue;
    const key = wallDedupeKey(wall);
    if (seenWallKeys.has(key)) continue;
    seenWallKeys.add(key);
    buildWall(wall);
  }

  for (const door of (data.doors || [])) {
    buildDoor(door);
  }

  for (const win of (data.windows || [])) {
    buildWindow(win);
  }

  const allObjects = [
    ...(data.objects || []),
    ...(data.floor_objects || []),
    ...(data.wall_objects || []),
    ...(data.small_objects || []),
    ...(data.ceiling_objects || []),
  ];
  const seenAssets = new Set();
  const objectPromises = [];
  for (const obj of allObjects) {
    if (!obj.asset_id) continue;
    const key = `${obj.asset_id}_${obj.id}`;
    if (seenAssets.has(key)) continue;
    seenAssets.add(key);
    objectPromises.push(buildObject(obj));
  }
  const meshes = await Promise.all(objectPromises);
  for (const m of meshes) {
    if (m) draggableObjects.push(m);
  }

  info.textContent = `Scene: ${data.query || 'unknown'} | Rooms: ${data.rooms.length} | Objects: ${allObjects.length}`;
}

loadScene();
animate();
</script>
</body>
</html>
