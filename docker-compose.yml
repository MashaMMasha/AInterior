# Colima: для MinIO + assets + ML — `make colima-big` (16G RAM, диск до ~120GiB если позволяет Colima)
services:
  minio:
    image: minio/minio:latest
    container_name: ainterior-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ainterior-network

  minio-init:
    image: minio/mc:latest
    container_name: ainterior-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set minio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb minio/ainterior-models --ignore-existing;
      /usr/bin/mc anonymous set download minio/ainterior-models;
      /usr/bin/mc mb minio/ainterior-assets --ignore-existing;
      /usr/bin/mc anonymous set download minio/ainterior-assets;
      echo 'MinIO configured successfully';
      "
    networks:
      - ainterior-network

  # Заливка objathor-ассетов в MinIO: сначала make setup-assets (скачивание) или готовый ~/.objathor-assets
  # Команда: docker compose --profile upload run --rm upload-objathor-assets  (см. Makefile upload-assets-docker)
  upload-objathor-assets:
    profiles: ["upload"]
    build:
      context: .
      dockerfile: Dockerfile.agents
    entrypoint: ["python", "/app/scripts/upload_assets_to_s3.py"]
    environment:
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=ainterior-assets
      - S3_KEY_PREFIX=objathor-assets
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      - OBJATHOR_ASSETS_BASE_DIR=/data/objathor-assets
    volumes:
      - ${OBJATHOR_ASSETS_DIR:-$HOME/.objathor-assets}:/data/objathor-assets:ro
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - ainterior-network

  postgres:
    image: postgres:16-alpine
    container_name: ainterior-postgres
    environment:
      POSTGRES_DB: ainterior
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ainterior"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ainterior-network

  redis:
    image: redis:7-alpine
    container_name: ainterior-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ainterior-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ainterior-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ainterior-network

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: ainterior-auth-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ainterior
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./auth-service:/app/auth_service
    command: uvicorn auth_service.main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - ainterior-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ainterior-backend-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ainterior
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - AUTH_SERVICE_URL=http://auth-service:8001
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=ainterior-models
      - S3_REGION=us-east-1
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
    depends_on:
      auth-service:
        condition: service_started
      minio:
        condition: service_started
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-service:/app/backend_service
    command: uvicorn backend_service.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ainterior-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chat-service:
    build:
      context: .
      dockerfile: Dockerfile.chat
    container_name: ainterior-chat-service
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - AGENTS_SERVICE_URL=http://agents-service:8006
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ainterior
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./chat-service:/app/chat_service
    command: uvicorn chat_service.main:app --host 0.0.0.0 --port 8003 --reload
    networks:
      - ainterior-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  project-service:
    build:
      context: .
      dockerfile: Dockerfile.project
    container_name: ainterior-project-service
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ainterior
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./project-service:/app/project_service
    command: uvicorn project_service.main:app --host 0.0.0.0 --port 8004 --reload
    networks:
      - ainterior-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  storage-service:
    build:
      context: .
      dockerfile: Dockerfile.storage
    container_name: ainterior-storage-service
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=ainterior-models
      - S3_REGION=us-east-1
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./storage-service:/app/storage_service
    command: uvicorn storage_service.main:app --host 0.0.0.0 --port 8005 --reload
    networks:
      - ainterior-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agents-service:
    build:
      context: .
      dockerfile: Dockerfile.agents
    container_name: ainterior-agents-service
    ports:
      - "8006:8006"
    env_file:
      - .env
    environment:
      # S3/MinIO (см. minio-init: бакет ainterior-assets). Для реального S3 замените endpoint/keys в .env и пересоберите.
      - AGENTS_USE_LOCAL_ASSETS=0
      - DISPLAY=:99
      - LIBGL_ALWAYS_SOFTWARE=1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_KEY_PREFIX=objathor-assets
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=ainterior-assets
      - AWS_DEFAULT_REGION=us-east-1
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ainterior
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - DB_URL=postgresql://user:password@postgres:5432/ainterior
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./agents-service:/app/agents-service
    shm_size: "2gb"
    networks:
      - ainterior-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8006/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 1200s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ainterior-frontend
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - backend-service
      - chat-service
      - project-service
      - agents-service
    networks:
      - ainterior-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ainterior-network:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  redis-data:
  rabbitmq-data:
